<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRUNA GAMER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#09040f;
color:white;

}

header{

height:100vh;

background:linear-gradient(180deg,#120021,#000);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}

h1{

font-size:70px;

color:#ff3bb8;

}

h2{

margin-top:15px;

font-size:30px;

}

p{

margin-top:25px;

font-size:20px;

color:#ddd;

}

button{

margin-top:35px;

padding:18px 40px;

font-size:22px;

border:none;

border-radius:50px;

background:#ff1493;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

background:#ff42aa;

}

</style>

</head>

<body>

<header>

<h1>BRUNA GAMER</h1>

<h2>Criadora de Conteúdo Fortnite</h2>

<p>Bem-vindo ao Portal Oficial</p>

<button>🎮 MEUS MAPAS</button>

</header>

</body>
</html>
