<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FORTBRASIL.GG - O maior hub de Fortnite do Brasil. Loja, Stats, Notícias e Mapa.">
    <title>FORTBRASIL.GG - Hub de Fortnite Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover:hover { transform: translateY(-4px); transition: 0.3s; }
        body { background-color: #0a0a0f; }
    </style>
</head>
<body class="text-white font-sans">

    <!-- HEADER -->
    <header class="bg-[#11111a] border-b border-purple-600 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold text-purple-400">FORTBRASIL.GG</h1>
            <nav class="hidden md:flex gap-6">
                <a href="#" class="hover:text-purple-400">Loja</a>
                <a href="#stats" class="hover:text-purple-400">Stats</a>
                <a href="#" class="hover:text-purple-400">Mapa</a>
                <a href="#" class="hover:text-purple-400">Notícias</a>
            </nav>
        </div>
    </header>

    <!-- HERO -->
    <section class="bg-gradient-to-b from-purple-900 to-[#0a0a0f] text-center py-20 px-4">
        <h2 class="text-5xl font-bold mb-4">FORTBRASIL.GG</h2>
        <p class="text-gray-300 mb-6">O maior hub de Fortnite do Brasil</p>
        <div class="max-w-md mx-auto flex">
            <input id="playerInput" type="text" placeholder="Digite seu nick Epic" class="w-full p-3 rounded-l-lg bg-[#222] text-white outline-none">
            <button onclick="buscarStats()" class="bg-purple-600 px-6 py-3 rounded-r-lg font-bold hover:bg-purple-700">Buscar</button>
        </div>
    </section>

    <!-- LOJA DE HOJE -->
    <section class="container mx-auto p-4">
        <h3 class="text-2xl font-bold mb-4">🔥 Loja de Hoje</h3>
        <p class="text-gray-400 text-sm mb-4">Atualiza todo dia às 21h BRT</p>
        <div id="loja" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <p>Carregando loja...</p>
        </div>
    </section>

    <!-- STATS -->
    <section id="stats" class="container mx-auto p-4 mt-10">
        <h3 class="text-2xl font-bold mb-4">📊 Estatísticas</h3>
        <div id="statsResultado" class="bg-[#11111a] p-6 rounded-lg border-purple-800">
            <p class="text-gray-400">Busque um nick acima para ver KD, vitórias e partidas</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-[#11111a] text-center p-6 mt-10 text-gray-400 border-t border-purple-900">
        <p>© 2026 FORTBRASIL.GG - Feito por fãs. Não afiliado à Epic Games.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
